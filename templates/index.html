<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 下载器</title>
  <style>
    body {font-family: system-ui; background: #f4f4f4; margin:0; padding:15px;}
    .container {max-width: 680px; margin:auto; background:white; padding:25px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.1);}
    input, select, button {width:100%; padding:14px; margin:10px 0; font-size:17px; border-radius:8px;}
    input, select {border:1px solid #ddd;}
    button {background:#e60000; color:white; border:none; font-weight:bold;}
    button:active {background:#cc0000;}
    .cookies-btn {background:#007bff;}
    #status {margin-top:20px; padding:15px; border-radius:8px; min-height:50px;}
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 YouTube 下载器</h1>
    
    <h3>第一步：上传 Cookies（重要）</h3>
    <input type="file" id="cookiesFile" accept=".txt">
    <button class="cookies-btn" onclick="uploadCookies()">📤 上传 cookies.txt</button>

    <h3>第二步：下载视频</h3>
    <input type="text" id="url" placeholder="粘贴 YouTube 视频链接" />
    <select id="format">
      <option value="video">📹 视频 (最高画质)</option>
      <option value="audio">🎵 音频 (MP3)</option>
    </select>
    <button onclick="startDownload()">🚀 开始下载</button>
    
    <div id="status"></div>
  </div>

  <script>
    async function uploadCookies() {
      const fileInput = document.getElementById('cookiesFile');
      if (!fileInput.files[0]) return alert("请先选择 cookies.txt 文件");
      
      const form = new FormData();
      form.append('cookies', fileInput.files[0]);
      
      const res = await fetch('/upload_cookies', {method: 'POST', body: form});
      const data = await res.json();
      
      if (data.success) {
        alert(data.message);
      } else {
        alert(data.error);
      }
    }

    async function startDownload() {
      const url = document.getElementById('url').value.trim();
      const fmt = document.getElementById('format').value;
      const statusDiv = document.getElementById('status');
      
      if (!url) return alert("请输入 YouTube 链接！");
      
      statusDiv.innerHTML = "🔍 正在解析视频...";
      
      const form = new FormData();
      form.append('url', url);
      form.append('format', fmt);
      
      const res = await fetch('/download', {method: 'POST', body: form});
      const {task_id} = await res.json();

      const interval = setInterval(async () => {
        const pRes = await fetch(`/progress/${task_id}`);
        const p = await pRes.json();

        if (p.status === "finished") {
          clearInterval(interval);
          statusDiv.innerHTML = `✅ 下载完成！<br><a href="/getfile/${task_id}" style="color:blue;">⬇️ 点击这里下载文件</a>`;
        } else if (p.status === "downloading") {
          statusDiv.textContent = `⏳ 下载中... ${p.percent || 0}%`;
        } else if (p.status === "error") {
          clearInterval(interval);
          statusDiv.innerHTML = `❌ 下载失败: ${p.error}`;
        }
      }, 1500);
    }
  </script>
</body>
</html>
