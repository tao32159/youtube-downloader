<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 下载器</title>
  <style>
    body {font-family: system-ui; background: #f4f4f4; margin:0; padding:15px;}
    .container {max-width: 680px; margin:auto; background:white; padding:25px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.1);}
    input, select, button {width:100%; padding:14px; margin:10px 0; font-size:17px; border-radius:8px;}
    input, select {border:1px solid #ddd;}
    button {background:#e60000; color:white; border:none; font-weight:bold;}
    button:active {background:#cc0000;}
    .cookies-btn {background:#007bff;}
    #status {margin-top:20px; padding:15px; border-radius:8px; min-height:60px;}
    .format-btn {background:#28a745; margin:5px 0;}
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 YouTube 下载器</h1>
    
    <h3>1. 上传 Cookies</h3>
    <input type="file" id="cookiesFile" accept=".txt">
    <button class="cookies-btn" onclick="uploadCookies()">📤 上传 cookies.txt</button>

    <h3>2. 粘贴视频链接</h3>
    <input type="text" id="url" placeholder="https://youtu.be/..." />
    <button onclick="getFormats()">🔍 获取清晰度</button>

    <div id="formats" style="margin-top:15px;"></div>
    
    <div id="status"></div>
  </div>

  <script>
    async function uploadCookies() {
      const file = document.getElementById('cookiesFile').files[0];
      if (!file) return alert("请选择 cookies.txt 文件");
      const form = new FormData();
      form.append('cookies', file);
      const res = await fetch('/upload_cookies', {method:'POST', body:form});
      const data = await res.json();
      alert(data.message || data.error);
    }

    async function getFormats() {
      const url = document.getElementById('url').value.trim();
      const status = document.getElementById('status');
      if (!url) return alert("请输入链接");

      status.innerHTML = "正在解析视频格式...";
      document.getElementById('formats').innerHTML = "";

      const form = new FormData();
      form.append('url', url);

      const res = await fetch('/info', {method:'POST', body:form});
      const data = await res.json();

      if (!data.success) {
        status.innerHTML = `❌ ${data.error}`;
        return;
      }

      let html = `<h3>${data.title}</h3><p>选择清晰度下载：</p>`;
      data.formats.forEach(f => {
        html += `
          <button class="format-btn" onclick="startDownload('${url}', '${f.itag}')">
            ${f.quality} (${f.ext})
          </button>`;
      });
      document.getElementById('formats').innerHTML = html;
      status.innerHTML = "";
    }

    async function startDownload(url, format_id) {
      const status = document.getElementById('status');
      status.innerHTML = "🚀 开始下载...";

      const form = new FormData();
      form.append('url', url);
      form.append('format_id', format_id);

      const res = await fetch('/download', {method:'POST', body:form});
      const {task_id} = await res.json();

      const interval = setInterval(async () => {
        const pRes = await fetch(`/progress/${task_id}`);
        const p = await pRes.json();

        if (p.status === "finished") {
          clearInterval(interval);
          status.innerHTML = `✅ 下载完成！<br><a href="/getfile/${task_id}" style="color:blue;font-size:18px;">⬇️ 点击下载文件</a>`;
        } else if (p.status === "downloading") {
          status.textContent = `⏳ 下载中... ${p.percent || 0}%`;
        } else if (p.status === "error") {
          clearInterval(interval);
          status.innerHTML = `❌ ${p.error}`;
        }
      }, 1200);
    }
  </script>
</body>
</html>
